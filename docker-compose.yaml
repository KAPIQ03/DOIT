services:
  # Baza Danych (PostgreSQL)
  db:
    image: postgres:15
    container_name: doit_db
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - doit_pgdata:/var/lib/postgresql/data
    ports:
      - '${DB_LOCAL_PORT}:5432'
    networks:
      - app_network

  # Backend API (Laravel)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: doit_api
    volumes:
      - ./backend:/var/www
    ports:
      - '${BACKEND_LOCAL_PORT}:8000'
    depends_on:
      - db
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_DATABASE: ${POSTGRES_DB}
      DB_USERNAME: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
    networks:
      - app_network

  # Frontend (Next.js)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: doit-frontend
    restart: always
    ports:
      - '${FRONTEND_LOCAL_PORT}:3000'
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    environment:
      NEXT_PUBLIC_BACKEND_URL: http://localhost:${BACKEND_LOCAL_PORT}
      WATCHPACK_POLLING: 'true'
    networks:
      - app_network

volumes:
  doit_pgdata:

networks:
  app_network:
